<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="login-page" class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-school"></i> School Admin</h2>
            <input type="text" id="username" placeholder="Username (admin)" />
            <input type="password" id="password" placeholder="Password (admin)" />
            <button onclick="login()">Login</button>
            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden by default) -->
    <div id="main-app" class="app-container" style="display: none;">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <h2><i class="fas fa-graduation-cap"></i> EduManage</h2>
            </div>
            <nav>
                <ul>
                    <li onclick="showSection('dashboard')" class="active"><i class="fas fa-home"></i> Dashboard</li>
                    <li onclick="showSection('students')"><i class="fas fa-user-graduate"></i> Students</li>
                    <li onclick="showSection('teachers')"><i class="fas fa-chalkboard-teacher"></i> Teachers</li>
                    <li onclick="showSection('fees')"><i class="fas fa-dollar-sign"></i> Fees</li>
                    <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
                </ul>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            
            <!-- HEADER -->
            <header>
                <h2 id="page-title">Dashboard</h2>
                <div class="user-info">Admin User</div>
            </header>

            <!-- SECTIONS -->
            
            <!-- 1. DASHBOARD SECTION -->
            <section id="dashboard" class="section active-section">
                <div class="cards">
                    <div class="card">
                        <h3>Total Students</h3>
                        <p id="total-students">0</p>
                    </div>
                    <div class="card">
                        <h3>Total Teachers</h3>
                        <p>12</p>
                    </div>
                    <div class="card">
                        <h3>Fees Collected</h3>
                        <p>$12,450</p>
                    </div>
                </div>
            </section>

            <!-- 2. STUDENTS SECTION -->
            <section id="students" class="section" style="display: none;">
                <div class="action-bar">
                    <button class="btn-primary" onclick="toggleStudentForm()">+ Add New Student</button>
                </div>

                <!-- Add Student Form (Hidden by default) -->
                <div id="student-form-container" class="form-container" style="display: none;">
                    <h3>Add New Student</h3>
                    <form id="add-student-form" onsubmit="addStudent(event)">
                        <input type="text" id="s-name" placeholder="Full Name" required>
                        <input type="number" id="s-age" placeholder="Age" required>
                        <select id="s-class">
                            <option value="Class 1">Class 1</option>
                            <option value="Class 2">Class 2</option>
                            <option value="Class 3">Class 3</option>
                        </select>
                        <button type="submit" class="btn-success">Save</button>
                        <button type="button" class="btn-danger" onclick="toggleStudentForm()">Cancel</button>
                    </form>
                </div>

                <!-- Students Table -->
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Class</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        <!-- Rows will be added here by JS -->
                    </tbody>
                </table>
            </section>

            <!-- 3. TEACHERS SECTION (Placeholder) -->
            <section id="teachers" class="section" style="display: none;">
                <p>Teacher management module coming soon...</p>
            </section>

             <!-- 4. FEES SECTION (Placeholder) -->
             <section id="fees" class="section" style="display: none;">
                <p>Fee management module coming soon...</p>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
